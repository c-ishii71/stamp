<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>スタンプラリー</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: sans-serif; background:#f8fafc; text-align:center; }
    .stamps { display:grid; grid-template-columns: repeat(5, 1fr); gap:10px; max-width:320px; margin:20px auto; }
    .stamp { border:2px dashed #ccc; padding:15px; border-radius:10px; }
    .done { background:#dcfce7; border-color:#22c55e; }
  </style>
</head>
<body>

<h1>スタンプラリー</h1>

<div class="stamps" id="stamps"></div>

<p id="message">QRコードを読み取ってスタンプを集めよう</p>

<script>
  const TOTAL = 5;
  let stamps = JSON.parse(localStorage.getItem("stamps") || "[]");
  if (stamps.length !== TOTAL) stamps = Array(TOTAL).fill(false);

  const params = new URLSearchParams(location.search);
  const num = Number(params.get("stamp"));

  if (num >= 1 && num <= TOTAL) {
    stamps[num - 1] = true;
    localStorage.setItem("stamps", JSON.stringify(stamps));
  }

  const container = document.getElementById("stamps");
  stamps.forEach((s, i) => {
    const div = document.createElement("div");
    div.className = "stamp" + (s ? " done" : "");
    div.innerHTML = s ? `✅ ${i+1}` : `⬜ ${i+1}`;
    container.appendChild(div);
  });

  if (stamps.every(Boolean)) {
    document.getElementById("message").textContent = "🎉 5つ集まりました！";
  }
</script>

</body>
</html>
