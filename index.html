<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>くみまち スタンプラリー</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      text-align: center;
      background: linear-gradient(#67b7dc, #7ec47a);
      color: #333;
    }

    .screen {
      min-height: 100vh;
      padding: 24px 16px;
      box-sizing: border-box;
    }

    h1 {
      color: white;
      margin-top: 20px;
    }

    .card {
      background: #e8f6f3;
      border-radius: 16px;
      padding: 20px;
      margin: 20px auto;
      max-width: 320px;
    }

    button {
      background: #ffd84d;
      border: none;
      border-radius: 999px;
      padding: 14px 28px;
      font-size: 16px;
      margin-top: 20px;
      cursor: pointer;
    }

    #stamp {
      display: none;
    }

    .stamps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      max-width: 320px;
      margin: 30px auto;
    }

    .stamp {
      background: white;
      border-radius: 50%;
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stamp img {
      width: 60px;
      height: 60px;
    }
  </style>
</head>

<body>

<!-- TOP画面 -->
<div id="top" class="screen">
  <h1>くみまち<br>スタンプラリー</h1>

  <div class="card">
    <strong>店内を回って<br>スタンプを集めよう！</strong>
  </div>

  <button onclick="goStamp()">スタンプラリー帳へ</button>
</div>

<!-- スタンプ帳 -->
<div id="stamp" class="screen">
  <h1>スタンプ帳</h1>
  <div id="stamps" class="stamps"></div>
</div>

<script>
  const TOTAL = 5;

  function goStamp() {
    document.getElementById("top").style.display = "none";
    document.getElementById("stamp").style.display = "block";
    renderStamps();
  }

  function renderStamps() {
    const container = document.getElementById("stamps");
    container.innerHTML = "";

    let stamps = JSON.parse(localStorage.getItem("stamps") || "[]");
    if (stamps.length !== TOTAL) {
      stamps = Array(TOTAL).fill(false);
    }

    for (let i = 1; i <= TOTAL; i++) {
      const div = document.createElement("div");
      div.className = "stamp";

      const img = document.createElement("img");
      img.src = stamps[i - 1]
        ? `画像/stamp${i}.png`
        : `画像/stamp_empty.png`;

      div.appendChild(img);
      container.appendChild(div);
    }
  }

  // QR (?stamp=1〜5) で来た場合
  const params = new URLSearchParams(location.search);
  const num = Number(params.get("stamp"));

  if (num >= 1 && num <= TOTAL) {
    let stamps = JSON.parse(localStorage.getItem("stamps") || "[]");
    if (stamps.length !== TOTAL) {
      stamps = Array(TOTAL).fill(false);
    }
    stamps[num - 1] = true;
    localStorage.setItem("stamps", JSON.stringify(stamps));
    goStamp();
  }
</script>

</body>
</html>
