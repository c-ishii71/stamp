<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>くみまち スタンプラリー</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      text-align: center;
      background: linear-gradient(#67b7dc, #7ec47a);
      color: #333;
    }

    .screen {
      min-height: 100vh;
      padding: 24px 16px;
      box-sizing: border-box;
    }

    h1 {
      color: white;
      margin-top: 20px;
    }

    .card {
      background: #e8f6f3;
      border-radius: 16px;
      padding: 20px;
      margin: 20px auto;
      max-width: 320px;
    }

    .stamp-preview {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      max-width: 260px;
      margin: 20px auto;
    }

    .stamp-preview img {
      width: 70px;
      height: 70px;
    }

    button {
      background: #ffd84d;
      border: none;
      border-radius: 999px;
      padding: 14px 28px;
      font-size: 16px;
      margin-top: 20px;
      cursor: pointer;
    }

    .stamps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      max-width: 320px;
      margin: 30px auto;
    }

    .stamp {
      background: white;
      border-radius: 50%;
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stamp img {
      width: 60px;
      height: 60px;
    }

    #message {
      color: white;
      font-size: 18px;
      font-weight: bold;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<!-- ===== TOP画面 ===== -->
<div id="top" class="screen">
  <h1>くみまち<br>スタンプラリー</h1>

  <div class="card">
    <strong>店内を回って<br>スタンプを集めよう！</strong>
  </div>

  <div class="stamp-preview">
    <img src="images/stamp_empty.png">
    <img src="images/stamp_empty.png">
    <img src="images/stamp_empty.png">
    <img src="images/stamp_empty.png">
    <img src="images/stamp_empty.png">
  </div>

  <button onclick="goStamp()">スタンプラリー帳へ</button>
</div>

<!-- ===== スタンプ帳 ===== -->
<div id="stamp" class="screen" style="display:none;">
  <h1>スタンプラリー</h1>
  <div id="stamps" class="stamps"></div>
  <div id="message">QRコードを読み取ってスタンプを集めよう</div>
</div>

<script>
  const TOTAL = 5;

  function getStamps() {
    const saved = JSON.parse(localStorage.getItem("stamps") || "[]");
    return saved.length === TOTAL ? saved : Array(TOTAL).fill(false);
  }

  function saveStamps(stamps) {
    localStorage.setItem("stamps", JSON.stringify(stamps));
  }

  function goStamp() {
    document.getElementById("top").style.display = "none";
    document.getElementById("stamp").style.display = "block";
    renderStamps();
  }

  function renderStamps() {
    const container = document.getElementById("stamps");
    container.innerHTML = "";

    const stamps = getStamps();

    stamps.forEach((done, i) => {
      const div = document.createElement("div");
      div.className = "stamp";
      div.innerHTML = done
        ? `<img src="images/stamp${i + 1}.iv);
    });

    if (stamps.every(Boolean)) {
      document.getElementById("message").textContent = "🎉 5つそろいました！";
    }
  }

  // QRコード (?stamp=1〜5) 経由
  const params = new URLSearchParams(location.search);
  const num = Number(params.get("stamp"));

  if (num >= 1 && num <= TOTAL) {
    const stamps = getStamps();
    stamps[num - 1] = true;
    saveStamps(stamps);
    goStamp();
  }
</script>

</body>
</html>
