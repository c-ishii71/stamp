<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>くみまち スタンプラリー</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      text-align: center;
      background: linear-gradient(#67b7dc, #7ec47a);
      color: #333;
    }

    .screen {
      min-height: 100vh;
      padding: 24px 16px;
      box-sizing: border-box;
    }

    h1 {
      color: white;
      margin-top: 20px;
    }

    .card {
      background: #e8f6f3;
      border-radius: 16px;
      padding: 20px;
      margin: 20px auto;
      max-width: 320px;
    }

    button {
      background: #ffd84d;
      border: none;
      border-radius: 999px;
      padding: 14px 28px;
      font-size: 16px;
      margin-top: 20px;
      cursor: pointer;
    }

    #stamp {
      display: none;
    }

    .stamp {
      background: white;
      margin: 10px auto;
      padding: 12px;
      max-width: 200px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<!-- TOP画面 -->
<div id="top" class="screen">
  <h1>くみまち<br>スタンプラリー</h1>

  <div class="card">
    <strong>店内を回って<br>スタンプを集めよう！</strong>
  </div>

  <button onclick="goStamp()">スタンプラリー帳へ</button>
</div>

<!-- スタンプ帳 -->
<div id="stamp" class="screen">
  <h1>スタンプ帳</h1>
  <div id="stamps"></div>
</div>

<script>
  const TOTAL = 5;

  function goStamp() {
    document.getElementById("top").style.display = "none";
    document.getElementById("stamp").style.display = "block";
    renderStamps();
  }

  function renderStamps() {
    const container = document.getElementById("stamps");
    container.innerHTML = "";
    for (let i = 1; i <= TOTAL; i++) {
      const div = document.createElement("div");
      div.className = "stamp";
      div.textContent = "スタンプ " + i;
      container.appendChild(div);
    }
  }
</script>

</body>
</html>
