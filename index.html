<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>動作確認</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: sans-serif; text-align: center; }
    #stamp { display: none; }
  </style>
</head>

<body>

<div id="top">
  <h1>TOP画面</h1>
  <button onclick="goStamp()">スタンプラリー帳へ</button>
</div>

<div id="stamp">
  <h1>スタンプ帳</h1>
  <p>ここが表示されたら成功です</p>
</div>

<script>
  function goStamp() {
    document.getElementById("top").style.display = "none";
    document.getElementById("stamp").style.display = "block";
  }
</script>

</body>
</html>
